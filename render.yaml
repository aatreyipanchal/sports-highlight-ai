services:
  # 🐍 Backend (FastAPI)
  - type: web
    name: sports-highlight-api
    runtime: python
    plan: free # Change to 'starter' or higher for AI performance (2GB+ RAM)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://sports-highlight-web.onrender.com

  # ⚛️ Frontend (Next.js)
  - type: web
    name: sports-highlight-web
    runtime: node
    plan: free
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://sports-highlight-api.onrender.com
